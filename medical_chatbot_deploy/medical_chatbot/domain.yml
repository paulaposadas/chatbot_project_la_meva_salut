version: "3.1"

slots:
  preferred_language:
    type: text
    mappings:
      - type: from_llm

  initial_description:
    type: text
    mappings:
      - type: from_llm

  appointment_reason:
    type: text
    mappings:
      - type: from_llm

  pain_location:
    type: text
    mappings:
      - type: from_llm

  pain_type:
    type: text
    mappings:
      - type: from_llm

  symptom_duration:
    type: text
    mappings:
      - type: from_llm

  symptom_evolution:
    type: text
    mappings:
      - type: from_llm

  pain_intensity:
    type: text
    mappings:
      - type: from_llm

  taking_meds:
    type: bool
    mappings:
      - type: from_llm

  meds_details:
    type: text
    mappings:
      - type: from_llm

  is_smoker:
    type: text
    mappings:
      - type: from_llm

  allergies_details:
    type: text
    mappings:
      - type: from_llm

  chronic_conditions_details:
    type: text
    mappings:
      - type: from_llm

  has_extra_info:
    type: text
    mappings:
      - type: from_llm

  extra_info:
    type: text
    mappings:
      - type: from_llm

  report_confirmed:
    type: bool
    mappings:
      - type: from_llm

  edit_request:
    type: text
    mappings:
      - type: from_llm

  appointment_accepted:
    type: text
    mappings:
      - type: from_llm

  chosen_date:
    type: text
    mappings:
      - type: from_llm

  doctor_has_details:
    type: text
    mappings:
      - type: from_llm

  needs_emergency:
    type: bool
    initial_value: false
    mappings:
      - type: from_llm

responses:

  utter_greet:
    - text: |
        Hola! Soc l'assistenta virtual de La Meva Salut. / ¡Hola! Soy la asistenta virtual de La Meva Salut.

        En quin idioma prefereixes continuar? / ¿En qué idioma prefieres continuar?

  utter_language_options:
    - text: "Català / Castellano"

  utter_ask_preferred_language:
    - text: "Català / Castellano"

  utter_redirect_es:
    - text: "Perfecto, continuamos en castellano."

  utter_redirect_ca:
    - text: "Perfecte, continuem en català."

  utter_ask_initial_description:
    - text: "Cuéntame qué te pasa con el mayor detalle posible (dónde te duele, desde cuándo, cómo es el dolor...)."

  utter_ask_appointment_reason:
    - text: "¿Cuál es el motivo de tu consulta: diagnóstico, baja médica, seguimiento, revisión, urgencia...?"

  utter_ask_pain_location:
    - text: "¿Dónde sientes exactamente el dolor o la molestia?"

  utter_ask_pain_type:
    - text: "¿Cómo describirías la sensación? Por ejemplo: molestia leve, dolor agudo, sordo, punzante, quemazón, presion..."

  utter_ask_symptom_duration:
    - text: "¿Desde cuándo tienes estos síntomas?"

  utter_ask_symptom_evolution:
    - text: "¿Han ido mejorando, empeorando o se mantienen igual desde que empezaron?"

  utter_ask_pain_intensity:
    - text: "En una escala del 0 al 10, donde 0 es ningun dolor y 10 el peor dolor imaginable, ¿cómo valorarías tu malestar?"

  utter_ask_taking_meds:
    - text: |
            ¿Has tomado algún medicamento o remedio para aliviar estos síntomas?
            
            En caso afirmativo, ¿cuál has tomado?

  utter_ask_meds_details:
    - text: "¿Qué medicamento has tomado y en qué dosis? ¿Te ha ayudado?"

  utter_ask_is_smoker:
    - text: "¿Fumas o consumes algún producto de tabaco?"

  utter_ask_has_allergies:
    - text: |
            ¿Tienes alergia a algún medicamento, alimento u otra sustancia?

            (En caso afirmativo, ¿a qué?)

  utter_ask_allergies_details:
    - text: "¿A qué tienes alergia?"

  utter_ask_has_chronic_conditions:
    - text: |
            ¿Tienes alguna enfermedad crónica o antecedente médico relevante (diabetes, hipertensión, asma...)?
    
            (En caso afirmativo, ¿qué condición tienes? ¿Podrías describir tus antecedentes?)

  utter_ask_chronic_conditions_details:
    - text: "¿Qué enfermedades o antecedentes tienes?"

  utter_ask_has_extra_info:
    - text: |
            ¿Quieres añadir algún detalle adicional, imagen u otra información útil para el médico?
            
            Ten en cuenta que cualquier dato que compartas quedará registrado como parte de tu historial clínico y será tratado conforme a la normativa de protección de datos vigente (RGPD).

            (En caso de querer añadir algo, escríbelo directamente a continuación. Si no, escribe 'no'.)

  utter_ask_extra_info:
    - text: "Adelante, comparte la información o imágenes que consideres relevantes. Ten en cuenta que cualquier dato que compartas quedará registrado como parte de tu historial clínico y será tratado conforme a la normativa de protección de datos vigente (RGPD). "

  utter_ask_report_confirmed:
    - text: "¿Es todo correcto?"

  utter_ask_edit_request:
    - text: "¿Qué dato quieres corregir? Dime ¿qué campo y cuál es el valor correcto (por ejemplo: 'el dolor es sordo, no punzante')?"

  utter_ask_appointment_accepted:
    - text: "La primera cita disponible es mañana a las 9:00 con la Dra. Posadas. ¿La confirmas?"
    - text: "La primera cita disponible es mañana a las 10:30 con la Dra. Vasilovici. ¿La confirmas?"
    - text: "La primera cita disponible es mañana a las 11:30 con la Dra. Justiniano. ¿La confirmas?"

  utter_ask_chosen_date:
    - text: "Indica tu preferencia de fecha y hora."

  utter_appointment_confirmed_es:
    - text: "Cita confirmada. Recibirás una confirmación por SMS y correo electrónico."

  utter_suggest_emergency_es:
    - text: "En tu situación, te recomendamos que acudas a urgencias o llames al 112. No esperes a la cita."

  utter_recommendations_es:
    - text: "placeholder"

  utter_ask_doctor_has_details:
    - text: |
            Antes de continuar, ¿tu médico ya tiene los detalles de tu caso?

            (Sí / No)

  utter_ask_initial_description_ca:
    - text: "Explica'm que et passa amb el màxim detall possible (on et fa mal, des de quan, com és el dolor...)."

  utter_ask_appointment_reason_ca:
    - text: "Quin és el motiu de la consulta: diagnòstic, baixa mèdica, seguiment, revisió, urgència...?"

  utter_ask_pain_location_ca:
    - text: "On tens exactament el dolor o la molèstia?"

  utter_ask_pain_type_ca:
    - text: "Com descriuries la sensació? Per exemple: molèstia lleu, dolor agut, sord, punxant, cremor, pressió..."

  utter_ask_symptom_duration_ca:
    - text: "Des de quan tens aquests símptomes?"

  utter_ask_symptom_evolution_ca:
    - text: "Han anat millorant, empitjorant o es mantenen iguals des que van començar?"

  utter_ask_pain_intensity_ca:
    - text: "En una escala de 0 a 10, on 0 és cap dolor i 10 és el pitjor dolor imaginable, com valoraries el teu malestar?"

  utter_ask_taking_meds_ca:
    - text: "Has pres algun medicament o remei per alleujar aquests símptomes? Quin?"

  utter_ask_meds_details_ca:
    - text: "Quin medicament has pres i quina dosi? T'ha ajudat?"

  utter_ask_is_smoker_ca:
    - text: "Fumes o consumeixes algun tipus de producte de tabac?"

  utter_ask_has_allergies_ca:
    - text: |
            Tens alguna al·lèrgia coneguda a medicaments, aliments o altres substàncies?

            (En cas afirmatiu, a què?)

  utter_ask_allergies_details_ca:
    - text: "A quines substàncies, medicaments o aliments tens al·lèrgia?"

  utter_ask_has_chronic_conditions_ca:
    - text: |
            Tens alguna malaltia crònica o antecedent mèdic rellevant (diabetis, hipertensió, asma...)?

            (En cas afirmatiu, quina? Pots descriure els teus antecedents?)

  utter_ask_chronic_conditions_details_ca:
    - text: "Quines malalties o antecedents tens?"

  utter_ask_has_extra_info_ca:
    - text: |
            Vols afegir algun detall addicional, imatge o altra informació útil per al metge?
            
            Tingues en compte que qualsevol dada que comparteixis quedarà registrada com a part del teu historial clínic i serà tractada d'acord amb la normativa de protecció de dades vigent (RGPD).
            
            (En cas de voler afegir alguna cosa, escriu-ho directament a continuació. Si no, escriu 'no'.)

  utter_ask_extra_info_ca:
    - text: "Endavant, comparteix la informació o imatges que consideris rellevants. Tingues en compte que qualsevol dada que comparteixis quedarà registrada com a part del teu historial clínic i serà tractada d'acord amb la normativa de protecció de dades vigent (RGPD)."

  utter_ask_report_confirmed_ca:
    - text: "És tot correcte?"

  utter_ask_edit_request_ca:
    - text: "Quin dada vols corregir? Digues quin camp i quin és el valor correcte (per exemple: 'el dolor és sord, no punxant')."

  utter_ask_appointment_accepted_ca:
    - text: "La primera cita disponible és demà a les 9:00 amb la Dra. Posadas. La confirmes?"
    - text: "La primera cita disponible és demà a les 10:30 amb la Dra. Vasilovici. La confirmes?"
    - text: "La primera cita disponible és demà a les 11:30 amb la Dra. Justiniano. La confirmes?"

  utter_ask_chosen_date_ca:
    - text: "Indica la teva preferència de data i hora."

  utter_appointment_confirmed_ca:
    - text: "Cita confirmada. Rebràs una confirmació per SMS i correu electrònic."

  utter_suggest_emergency_ca:
    - text: "En la teva situació, et recomanem que et dirigeixis a urgències o truquis al 112. No esperis a la cita."

  utter_recommendations_ca:
    - text: "placeholder"
    
  utter_ask_doctor_has_details_ca:
    - text: |
            Abans de continuar, el teu metge ja té els detalls del teu cas?

            (Sí / No)

  utter_cannot_handle:
    - text: "Ho sento, no he entès la teva resposta. / Lo siento, no he entendido tu respuesta."

  utter_ask_continue_conversation:
    - text: "Et puc ajudar en alguna altra cosa? / ¿Puedo ayudarte en algo más?"
  
  utter_ask_if_user_wants_anything_else:
    - text: "Et puc ajudar en cap altra cosa? / ¿Te puedo ayudar en algo més?"
  
  utter_free_chitchat_response:
    - text: "placeholder"
      metadata:
        rephrase: True
        rephrase_prompt: |
          Ets l'assistent virtual de La Meva Salut.
          L'idioma preferit del pacient és: {preferred_language}.
          Si preferred_language és 'catalan': respon ÚNICAMENT en català.
          Si preferred_language es 'castellano': respon ÚNICAMENT en castellano.
          Si no s'ha establert idioma: respon en català i castellano.
          L'usuari ha fet una pregunta fora de tema. Respon breument i redirigeix cap a la preparació de la cita.
          NO facis preguntes addicionals. Sigues breu.
          Conversa previa: {{history}}
          {{current_input}}
          Resposta:

actions:
  - action_route_by_language
  - action_extract_slots
  - action_triage_check
  - action_handle_report_edit
  - action_show_report
  - action_book_appointment
  - action_recommendations_es
  - action_recommendations_ca

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: false