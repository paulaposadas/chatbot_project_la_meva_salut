flows:

  greet_and_select_language:
    description: "Activar cuando el usuario escribe cualquier mensaje inicial o saludo. Si preferred_language ya tiene valor, saltar directamente al flow correspondiente sin saludar de nuevo ni pedir idioma. Si no tiene valor, saludar, recoger idioma y transferir."
    persisted_slots:
      - preferred_language
    steps:
      - action: action_route_by_language
        next:
          - if: "slots.preferred_language == 'catalan' or slots.preferred_language == 'catala' or slots.preferred_language == 'català' or slots.preferred_language == 'cat' or slots.preferred_language == 'Català' or slots.preferred_language == 'Catala' or slots.preferred_language == 'Catalan'"
            then: link_catalan
          - if: "slots.preferred_language == 'castellano' or slots.preferred_language == 'castella' or slots.preferred_language == 'español' or slots.preferred_language == 'espanol' or slots.preferred_language == 'Castellano' or slots.preferred_language == 'Español'"
            then: link_castellano
          - else: greet_and_ask
      - id: greet_and_ask
        action: utter_greet
        next: collect_language
      - id: collect_language
        collect: preferred_language
        description: "Idioma preferido del paciente. Valores validos: 'castellano' o 'catalan'. Si el usuario ya escribe en un idioma concreto, usar ese como valor."
        next:
          - if: "slots.preferred_language == 'catalan' or slots.preferred_language == 'catala' or slots.preferred_language == 'català' or slots.preferred_language == 'cat' or slots.preferred_language == 'Català' or slots.preferred_language == 'Catala' or slots.preferred_language == 'Catalan'"
            then: link_catalan
          - else: link_castellano
      - id: link_castellano
        action: utter_redirect_es
        next: link_to_es
      - id: link_to_es
        link: medical_appointment_es
      - id: link_catalan
        action: utter_redirect_ca
        next: link_to_ca
      - id: link_to_ca
        link: medical_appointment_ca

  medical_appointment_es:
    description: "Flow principal en castellano. Se activa via link desde greet_and_select_language cuando el idioma es castellano."
    always_include_in_prompt: false
    steps:
      - set_slots:
          - initial_description: null
          - appointment_reason: null
          - pain_location: null
          - pain_type: null
          - symptom_duration: null
          - symptom_evolution: null
          - pain_intensity: null
          - taking_meds: null
          - meds_details: null
          - is_smoker: null
          - allergies_details: null
          - chronic_conditions_details: null
          - has_extra_info: null
          - extra_info: null
          - report_confirmed: null
          - edit_request: null
          - appointment_accepted: null
          - chosen_date: null
          - doctor_has_details: null
          - needs_emergency: false
      - collect: appointment_reason
        utter: utter_ask_appointment_reason
        description: "Motivo principal de la consulta: diagnostico, baja medica, seguimiento, revision, urgencia... Preguntar siempre como primer paso."
        next:
          - if: "slots.appointment_reason == 'urgencia' or slots.appointment_reason == 'Urgencia'"
            then: emergency_early_es
          - if: "slots.appointment_reason == 'revision' or slots.appointment_reason == 'revisión' or slots.appointment_reason == 'Revision' or slots.appointment_reason == 'Revisión'"
            then: direct_date_es
          - if: "slots.appointment_reason == 'seguimiento' or slots.appointment_reason == 'Seguimiento'"
            then: followup_check_es
          - else: initial_description_es

      - id: emergency_early_es
        action: utter_suggest_emergency_es
        next: END

      - id: direct_date_es
        collect: chosen_date
        utter: utter_ask_chosen_date
        description: "Fecha elegida por el paciente para la revision, en castellano."
        next: book_es

      - id: followup_check_es
        collect: doctor_has_details
        utter: utter_ask_doctor_has_details
        description: "Si el medico ya tiene los detalles del caso. Texto. Si dice 'si', 'sí', 'yes', 'ya', 'correcto', 'efectivamente' o similar, guardar 'si'. Si dice 'no' o similar, guardar 'no'."
        next:
          - if: "slots.doctor_has_details == 'si' or slots.doctor_has_details == 'sí' or slots.doctor_has_details == 'Sí' or slots.doctor_has_details == 'Si'"
            then: appointment_es
          - else: initial_description_es

      - id: initial_description_es
        collect: initial_description
        utter: utter_ask_initial_description
        description: "Descripcion libre e inicial del paciente en castellano. Recoger exactamente lo que dice sin interrumpir. Solo recoger UNA VEZ; si ya tiene valor, NO volver a preguntar."
        ask_before_filling: false
        next: extract_es

      - id: extract_es
        action: action_extract_slots
        next: pain_location_es

      - id: pain_location_es
        collect: pain_location
        utter: utter_ask_pain_location
        description: "Parte del cuerpo afectada. Si ya se menciono en la descripcion inicial, usar ese valor directamente sin volver a preguntar."
        ask_before_filling: false
        next: pain_type_es

      - id: pain_type_es
        collect: pain_type
        utter: utter_ask_pain_type
        description: "Tipo de dolor: agudo, sordo, punzante, quemazón, presion, etc. Si ya se menciono en la descripcion inicial, usar ese valor directamente sin volver a preguntar."
        ask_before_filling: false
        next: symptom_duration_es

      - id: symptom_duration_es
        collect: symptom_duration
        utter: utter_ask_symptom_duration
        description: "Desde cuando tiene los sintomas. Si ya se menciono en la descripcion inicial, usar ese valor directamente sin volver a preguntar."
        ask_before_filling: false
        next: symptom_evolution_es

      - id: symptom_evolution_es
        collect: symptom_evolution
        utter: utter_ask_symptom_evolution
        description: "Evolucion de los sintomas: mejora, empeoramiento, igual. Si ya se menciono en la descripcion inicial, usar ese valor directamente sin volver a preguntar."
        ask_before_filling: false
        next: pain_intensity_es

      - id: pain_intensity_es
        collect: pain_intensity
        utter: utter_ask_pain_intensity
        description: "Intensidad del dolor del 0 al 10. Si ya se menciono en la descripcion inicial, usar ese valor directamente sin volver a preguntar."
        ask_before_filling: false
        next: meds_details_es

      - id: meds_details_es
        collect: meds_details
        utter: utter_ask_taking_meds
        description: "Medicamento tomado. Preguntar si ha tomado algun medicamento para aliviar los sintomas. Si dice 'no' o 'ninguno', guardar 'ninguno' y continuar. Si da alguna otra respuesta, por ejemplo el nombre de un medicamento como 'paracetamol' o 'ibuprofeno', guardarlo como valor del slot. Si ya tiene valor de la descripcion inicial, no volver a preguntar."
        ask_before_filling: false
        next: is_smoker_es

      - id: is_smoker_es
        collect: is_smoker
        utter: utter_ask_is_smoker
        description: "Si fuma. Texto. Guardar EXACTAMENTE 'si' o 'no'. Si dice cualquier variacion de no, guardar 'no' INMEDIATAMENTE y continuar SIN volver a preguntar. NUNCA preguntar mas de una vez. Si ya tiene valor no preguntar."
        ask_before_filling: false
        next: allergies_details_es

      - id: allergies_details_es
        collect: allergies_details
        utter: utter_ask_has_allergies
        description: "Preguntar por alergias del paciente, en castellano. Si el paciente dice CUALQUIER variacion de 'no' como 'no', 'No', 'NO', 'ninguna', 'ninguno', 'no tengo', 'no tengo nada', 'nada', 'sin alergias', 'no tengo alergias', 'no tengo ninguna', 'que va', 'tampoco' o cualquier respuesta negativa, guardar 'no' INMEDIATAMENTE y continuar SIN hacer mas preguntas. Solo preguntar de nuevo si la respuesta es completamente ambigua."
        ask_before_filling: false
        next: chronic_conditions_details_es

      - id: chronic_conditions_details_es
        collect: chronic_conditions_details
        utter: utter_ask_has_chronic_conditions
        description: "Enfermedades cronicas o antecedentes del paciente. CUALQUIER respuesta negativa debe guardarse como 'no' INMEDIATAMENTE y continuar SIN preguntar de nuevo. NUNCA preguntar mas de una vez. Si ya tiene valor, NO preguntar."
        ask_before_filling: false
        next: extra_info_es

      - id: extra_info_es
        collect: has_extra_info
        utter: utter_ask_has_extra_info
        description: "Preguntar si quiere anadir informacion adicional. Texto. Guardar 'si' o 'no'. Si dice 'si', 'sí', 'si quiero', 'quiero anadir' o cualquier respuesta que NO sea negacion clara = 'si'. Si escribe directamente texto informativo (cualquier frase que no sea solo si/no) = guardar 'si' EN ESTE SLOT y guardar ese texto en extra_info. Solo 'no', 'nada', 'ninguna', 'tampoco', 'no tengo nada que anadir' = 'no'. NUNCA preguntar mas de una vez."
        next:
          - if: "slots.has_extra_info == 'si' or slots.has_extra_info == 'sí' or slots.has_extra_info == 'Si' or slots.has_extra_info == 'Sí'"
            then: extra_info_text_es
          - else: show_report_es

      - id: extra_info_text_es
        collect: extra_info
        utter: utter_ask_extra_info
        description: "Recoger la informacion adicional que el paciente quiere compartir. Si el slot ya tiene valor (porque el paciente ya escribio el texto directamente antes), NO volver a preguntar. Guardar exactamente lo que escribe. UN SOLO TURNO, nunca mas."
        ask_before_filling: false
        next: show_report_es

      - id: show_report_es
        action: action_show_report
        next: confirm_report_es

      - id: confirm_report_es
        collect: report_confirmed
        utter: utter_ask_report_confirmed
        description: "Preguntar si el resumen es correcto. Boolean. SIEMPRE preguntar al usuario en este paso, nunca asumir respuesta. 'sí', 'si', 'correcto', 'está bien', 'ok', 'todo bien', 'exacto', 'perfecto' = true. 'no', 'quiero cambiar', 'modificar', 'hay un error' = false."
        next:
          - if: "slots.report_confirmed == true"
            then: triage_es
          - else: edit_report_es

      - id: edit_report_es
        collect: edit_request
        utter: utter_ask_edit_request
        description: "Que dato quiere corregir el paciente. Si el usuario indica que ya no quiere cambiar nada mas (frases como 'ya esta', 'nada mas', 'esta bien', 'no', 'ninguno', 'listo', 'ok', 'correcto') guardar el valor 'done' y continuar. En cualquier otro caso recoger la correccion exactamente como la dice."
        next:
          - if: "slots.edit_request == 'done'"
            then: triage_es
          - else: handle_edit_es

      - id: handle_edit_es
        action: action_handle_report_edit
        next: show_report_es

      - id: triage_es
        action: action_triage_check
        next:
          - if: "slots.needs_emergency"
            then: emergency_es
          - else: appointment_es

      - id: emergency_es
        action: utter_suggest_emergency_es
        next: END

      - id: appointment_es
        collect: appointment_accepted
        utter: utter_ask_appointment_accepted
        description: "Si acepta la primera cita disponible. Texto. Guardar EXACTAMENTE 'si' o 'no'. 'sí', 'si', 'vale', 'confirmo', 'ok', 'de acuerdo', 'afirmativo' = guardar 'si'. 'no' = guardar 'no'. NUNCA preguntar mas de una vez."
        next:
          - if: "slots.appointment_accepted == 'si' or slots.appointment_accepted == 'sí' or slots.appointment_accepted == 'Si' or slots.appointment_accepted == 'Sí'"
            then: book_es
          - else: chosen_date_es

      - id: chosen_date_es
        collect: chosen_date
        utter: utter_ask_chosen_date
        description: "Fecha elegida por el paciente, en castellano."
        next: book_es

      - id: book_es
        action: action_book_appointment
        next: confirmed_es

      - id: confirmed_es
        action: utter_appointment_confirmed_es
        next: recommendations_es

      - id: recommendations_es
        action: action_recommendations_es
        next: END

  medical_appointment_ca:
    description: "Flow principal en catala. Es activa via link des de greet_and_select_language quan l'idioma es catala."
    always_include_in_prompt: false
    steps:
      - set_slots:
          - initial_description: null
          - appointment_reason: null
          - pain_location: null
          - pain_type: null
          - symptom_duration: null
          - symptom_evolution: null
          - pain_intensity: null
          - taking_meds: null
          - meds_details: null
          - is_smoker: null
          - allergies_details: null
          - chronic_conditions_details: null
          - has_extra_info: null
          - extra_info: null
          - report_confirmed: null
          - edit_request: null
          - appointment_accepted: null
          - chosen_date: null
          - doctor_has_details: null
          - needs_emergency: false
      - collect: appointment_reason
        utter: utter_ask_appointment_reason_ca
        description: "Motiu principal de la consulta: diagnostic, baixa medica, seguiment, revisio, urgencia... Preguntar sempre com a primer pas."
        next:
          - if: "slots.appointment_reason == 'urgencia' or slots.appointment_reason == 'urgència' or slots.appointment_reason == 'Urgència' or slots.appointment_reason == 'Urgencia'"
            then: emergency_early_ca
          - if: "slots.appointment_reason == 'revisio' or slots.appointment_reason == 'revisió' or slots.appointment_reason == 'Revisio' or slots.appointment_reason == 'Revisió' or slots.appointment_reason == 'revision' or slots.appointment_reason == 'revisión'"
            then: direct_date_ca
          - if: "slots.appointment_reason == 'seguiment' or slots.appointment_reason == 'Seguiment' or slots.appointment_reason == 'seguimiento' or slots.appointment_reason == 'Seguimiento'"
            then: followup_check_ca
          - else: initial_description_ca

      - id: emergency_early_ca
        action: utter_suggest_emergency_ca
        next: END

      - id: direct_date_ca
        collect: chosen_date
        utter: utter_ask_chosen_date_ca
        description: "Data triada pel pacient per a la revisio, en catala."
        next: book_ca

      - id: followup_check_ca
        collect: doctor_has_details
        utter: utter_ask_doctor_has_details_ca
        description: "Si el metge ja te els detalls del cas. Text. Si diu 'si', 'sí', 'yes', 'ja', 'correcte', 'efectivament' o similar, guardar 'si'. Si diu 'no' o similar, guardar 'no'."
        next:
          - if: "slots.doctor_has_details == 'si' or slots.doctor_has_details == 'sí' or slots.doctor_has_details == 'Sí' or slots.doctor_has_details == 'Si'"
            then: appointment_ca
          - else: initial_description_ca

      - id: initial_description_ca
        collect: initial_description
        utter: utter_ask_initial_description_ca
        description: "Descripció lliure i inicial del pacient en català. Recollir exactament el que diu sense interrompre. Només recollir UNA VEGADA. Si el slot ja té valor NO tornar a preguntar mai."
        ask_before_filling: false
        next: extract_ca

      - id: extract_ca
        action: action_extract_slots
        next: pain_location_ca

      - id: pain_location_ca
        collect: pain_location
        utter: utter_ask_pain_location_ca
        description: "Part del cos afectada. Si ja es va mencionar a la descripcio inicial, usar aquell valor directament sense tornar a preguntar."
        ask_before_filling: false
        next: pain_type_ca

      - id: pain_type_ca
        collect: pain_type
        utter: utter_ask_pain_type_ca
        description: "Tipus de dolor: agut, sord, punxant, cremor, pressio, etc. Si ja es va mencionar a la descripcio inicial, usar aquell valor directament sense tornar a preguntar."
        ask_before_filling: false
        next: symptom_duration_ca

      - id: symptom_duration_ca
        collect: symptom_duration
        utter: utter_ask_symptom_duration_ca
        description: "Des de quan te els simptomes. Si ja es va mencionar a la descripcio inicial, usar aquell valor directament sense tornar a preguntar."
        ask_before_filling: false
        next: symptom_evolution_ca

      - id: symptom_evolution_ca
        collect: symptom_evolution
        utter: utter_ask_symptom_evolution_ca
        description: "Evolucio dels simptomes. Hi ha tres opcions: millora ('han millorat', 'milloren', 'millor'...), empitjorament ('han empitjorat', 'empitjoren', 'pitjor'...) o igual ('igual', 'no han canviat', ...). Si ja es va mencionar a la descripcio inicial, usar aquell valor directament sense tornar a preguntar."
        ask_before_filling: false
        next: pain_intensity_ca

      - id: pain_intensity_ca
        collect: pain_intensity
        utter: utter_ask_pain_intensity_ca
        description: "Intensitat del dolor de 0 a 10. Si ja es va mencionar a la descripcio inicial, usar aquell valor directament sense tornar a preguntar."
        ask_before_filling: false
        next: meds_details_ca

      - id: meds_details_ca
        collect: meds_details
        utter: utter_ask_taking_meds_ca
        description: "Medicament pres. Preguntar si ha pres algun medicament per alleujar els simptomes. Si diu 'no' o 'cap', guardar 'no' i continuar. Si dona cap altre resposta, com per exemple el nom d'un medicament com 'paracetamol' o 'ibuprofeno', guardar la resposta com a valor del slot. Si ja te valor de la descripcio inicial, no tornar a preguntar."
        ask_before_filling: false
        next: is_smoker_ca

      - id: is_smoker_ca
        collect: is_smoker
        utter: utter_ask_is_smoker_ca
        description: "Si fuma. Text. Guardar EXACTAMENT 'si' o 'no'. Si diu qualsevol variacio de no, guardar 'no' IMMEDIATAMENT i continuar SENSE tornar a preguntar. MAI preguntar mes d'una vegada. Si ja te valor no preguntar."
        ask_before_filling: false
        next: allergies_details_ca

      - id: allergies_details_ca
        collect: allergies_details
        utter: utter_ask_has_allergies_ca
        description: "Preguntar per al·lèrgies del pacient, en catala. Si el pacient diu QUALSEVOL variacio de 'no' com 'no', 'No', 'NO', 'cap', 'no en tinc', 'no tinc res', 'res', 'cap al·lergia', 'no tinc al·lergies' o qualsevol resposta negativa, guardar 'no' IMMEDIATAMENT i continuar SENSE fer mes preguntes. Nomes tornar a preguntar si la resposta es completament ambigua."
        ask_before_filling: false
        next: chronic_conditions_details_ca

      - id: chronic_conditions_details_ca
        collect: chronic_conditions_details
        utter: utter_ask_has_chronic_conditions_ca
        description: "Malalties croniques o antecedents del pacient. QUALSEVOL resposta negativa ha de guardar-se com a 'no' IMMEDIATAMENT i continuar SENSE tornar a preguntar. MAI preguntar mes d'una vegada. Si ja te valor, NO preguntar."
        ask_before_filling: false
        next: extra_info_ca

      - id: extra_info_ca
        collect: has_extra_info
        utter: utter_ask_has_extra_info_ca
        description: "Preguntar si vol afegir informacio addicional. Text. Guardar 'si' o 'no'. Si diu 'si', 'vull afegir' o qualsevol resposta que NO sigui negacio clara = 'si'. Si escriu directament text informatiu (qualsevol frase que no sigui nomes si/no) = guardar 'si' EN AQUEST SLOT i guardar aquell text a extra_info. Nomes 'no', 'res', 'cap', 'tampoc' = 'no'. MAI preguntar mes d'una vegada."
        next:
          - if: "slots.has_extra_info == 'si' or slots.has_extra_info == 'sí' or slots.has_extra_info == 'Si' or slots.has_extra_info == 'Sí'"
            then: extra_info_text_ca
          - else: show_report_ca

      - id: extra_info_text_ca
        collect: extra_info
        utter: utter_ask_extra_info_ca
        description: "Recollir la informacio addicional que el pacient vol compartir. Si el slot ja te valor (perque el pacient ja va escriure el text directament abans), NO tornar a preguntar. Guardar exactament el que escriu. UN SOL TORN, mai mes."
        ask_before_filling: false
        next: show_report_ca

      - id: show_report_ca
        action: action_show_report
        next: confirm_report_ca

      - id: confirm_report_ca
        collect: report_confirmed
        utter: utter_ask_report_confirmed_ca
        description: "Preguntar si el resum es correcte. Boolean. SEMPRE preguntar a l'usuari en aquest pas, mai assumir resposta. 'sí', 'si', 'correcte', 'esta be', 'ok', 'tot be', 'exacte', 'perfecte' = true. 'no', 'vull canviar', 'modificar', 'hi ha un error' = false."
        next:
          - if: "slots.report_confirmed == true"
            then: triage_ca
          - else: edit_report_ca

      - id: edit_report_ca
        collect: edit_request
        utter: utter_ask_edit_request_ca
        description: "Quin dada vol corregir el pacient. Si l'usuari indica que ja no vol canviar res mes (frases com 'ja esta', 'res mes', 'esta be', 'no', 'cap', 'llest', 'ok', 'correcte') guardar el valor 'done' i continuar. En qualsevol altre cas recollir la correccio exactament com la diu."
        next:
          - if: "slots.edit_request == 'done'"
            then: triage_ca
          - else: handle_edit_ca

      - id: handle_edit_ca
        action: action_handle_report_edit
        next: show_report_ca

      - id: triage_ca
        action: action_triage_check
        next:
          - if: "slots.needs_emergency"
            then: emergency_ca
          - else: appointment_ca

      - id: emergency_ca
        action: utter_suggest_emergency_ca
        next: END

      - id: appointment_ca
        collect: appointment_accepted
        utter: utter_ask_appointment_accepted_ca
        description: "Si accepta la primera cita disponible, en catala. Text. Guardar EXACTAMENT 'si' o 'no'. 'sí', 'si', 'vale', 'val', 'confirmo', 'ok', 'd acord', 'afirmatiu' = guardar 'si'. 'no' = guardar 'no'. MAI preguntar mes d'una vegada."
        next:
          - if: "slots.appointment_accepted == 'si' or slots.appointment_accepted == 'sí' or slots.appointment_accepted == 'Si' or slots.appointment_accepted == 'Sí'"
            then: book_ca
          - else: chosen_date_ca

      - id: chosen_date_ca
        collect: chosen_date
        utter: utter_ask_chosen_date_ca
        description: "Data triada pel pacient, en catala."
        next: book_ca

      - id: book_ca
        action: action_book_appointment
        next: confirmed_ca

      - id: confirmed_ca
        action: utter_appointment_confirmed_ca
        next: recommendations_ca

      - id: recommendations_ca
        action: action_recommendations_ca
        next: END