flows:
  pattern_session_start:
    description: Flow for starting the conversation
    name: pattern session start
    nlu_trigger:
      - intent: session_start
    steps:
      - link: greet_and_select_language

  pattern_chitchat:
    description: Flujo de reparación conversacional para interacciones fuera de tema que no interrumpan el flujo principal. No debe responder a saludos ni a nada para lo que haya un flujo definido. Responde en el idioma preferido del paciente si está disponible.
    name: pattern chitchat
    steps:
      - action: utter_free_chitchat_response
        next: END

  pattern_search:
    description: Flujo para responder preguntas de tipo informativo o de conocimiento general. Responde en el idioma preferido del paciente si está disponible.
    name: pattern search
    steps:
      - action: utter_free_chitchat_response
        next: END

  pattern_cannot_handle:
    description: "Responde brevemente que no has entendido, en el idioma preferido del paciente, sin hacer preguntas adicionales ni comentar el contenido de la respuesta."
    name: pattern cannot handle
    steps:
      - action: utter_cannot_handle
        next: END
  pattern_end_of_conversation:
    description: "Se activa al final de cada conversacion. No hacer ninguna accion, terminar silenciosamente."
    name: pattern end of conversation
    steps:
      - action: action_listen
        next: END